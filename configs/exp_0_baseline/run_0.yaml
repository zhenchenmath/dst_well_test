experiment:
  name: exp_0_baseline
  run: run_0
  description: "Baseline single-phase oil, 50x50 grid, k=100 mD, phi=0.25, q=100 m3/day, 24h dd + 48h bu"

grid:
  nx: 50
  ny: 50
  nz: 1
  lx: 2000.0
  ly: 2000.0
  lz: 10.0

fluid:
  type: single_oil
  viscosity: 1.0e-3
  compressibility: 1.0e-9

rock:
  field_h5: fields/homogeneous_100md_phi025.h5

schedule:
  drawdown_duration_hr: 24
  buildup_duration_hr: 48
  rate_m3_day: 100.0
  steps_per_phase: 30

pta:
  bourdet_L: 0.2
